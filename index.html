<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: rgb(19, 19, 78);
        }

        .container {
            background-color: #1e1e2e;
            text-align: center;
            max-width: 300px;
            width: 95%;
            margin: auto;
            border-radius: 16px;
            padding: 20px;

        }

        .btn,
        .btnn,
        .btn-sci {
            background-color: rgb(224, 224, 126);
            border-radius: 8px;
            border: none;
            padding: 5px 10px;
            width: 70px;
            font-size: x-large;
            text-align: center;
            margin-bottom: 10px;
            cursor: pointer;
        }

        .btn:hover,
        .btnn:hover .btn-sci:hover {
            background-color: rgb(240, 240, 100);
        }

        .btnbl,
        .btnb,
        .btnblu {
            background-color: rgb(152, 152, 220);
            border-radius: 8px;
            border: none;
            padding: 5px 10px;
            width: 70px;
            font-size: x-large;
            text-align: center;
            margin-bottom: 10px;
            cursor: pointer;
        }

        .btnbl:hover,
        .btnb:hover,
        .btnblu:hover {
            background-color: rgb(170, 170, 235);
        }

        .btnred {
            background-color: rgb(203, 22, 22);
            border-radius: 8px;
            border: none;
            padding: 5px 10px;
            width: 70px;
            font-size: x-large;
            text-align: center;
            margin-bottom: 10px;
            cursor: pointer;
            color: white;
        }

        .btnred:hover {
            background-color: rgb(230, 40, 40);
        }

        .container4 {
            display: flex;
            justify-content: center;
        }

        input {
            background-color: #2a2a3e;
            color: white;
            width: 100%;
            box-sizing: border-box;
            margin-bottom: 10px;
            height: 50px;
            border-radius: 10px;
            border: none;
            text-align: right;
            font-size: x-large;
            padding-right: 10px;
        }

        .history {
            border-radius: 10px;
            text-align: right;
            background-color: #2a2a3e;
            color: rgb(255, 255, 255);
            height: 40px;
            width: 100%;
            box-sizing: border-box;
            margin-bottom: 10px;
            font-size: large;
            border: none;
            padding-right: 10px;
        }

        .btnblue {
            background-color: green;
            border-radius: 8px;
            border: none;
            padding: 5px 10px;
            width: 70px;
            font-size: x-large;
            text-align: center;
            margin-bottom: 10px;
            cursor: pointer;
        }

        .btnblue:hover {
            background-color: rgb(40, 160, 60);
        }

        #scientific {
            display: none;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 10px;
            background-color: #1e1e2e;
            padding: 0;
            border-radius: 0;
            justify-items: center;
        }

        #scientific button {
            background-color: rgb(224, 224, 126);
            border-radius: 8px;
            border: none;
            padding: 5px 10px;
            width: 70px;
            height: 40px;
            font-size: x-large;
            text-align: center;
            cursor: pointer;
        }


        @media (max-width: 350px) {

            .btn,
            .btnb,
            .btnbl,
            .btnblu,
            .btnred {
                width: 50px;
                height: 50px;
                font-size: 16px;
            }

            .container {
                padding: 10px;
            }
        }
    </style>
</head>

<body>
    <div class="main">
        <div class="container">
            <div class="input">
                <input class="history" type="text" id="result" , placeholder="history">
                <input class="data" type="text" id="input" value="0">
            </div>
            <div id="scientific" style="display: none;">
                <button onclick="press('Math.sqrt(')">√</button>
                <button onclick="press('**')">^</button>
                <button onclick="press('Math.PI')">π</button>
            </div>
            <div class="container-button">
                <button class="btn-sci" onclick="toggleScientific()">f(X)</button>
                <button class="btnn" onclick="press('%')">%</button>
                <button class="btnn" onclick="backspace()" style="font-size:larger;">&#9003;</button>
                <button class="btnred" onclick="ClearScreen( )">C</button>

            </div>
            <div class="container-buttons">
                <button class="btn" onclick="press('+')">+</button>
                <button class="btn" onclick="press('-')">-</button>
                <button class="btn" onclick="press('*')">*</button>
                <button class="btn" onclick="press('/')">/</button>
            </div>

            <div class="container-numbers">
                <button class="btnb" onclick="press('7')">7</button>
                <button class="btnb" onclick="press('8')">8</button>
                <button class="btnb" onclick="press('9')">9</button>

                <button class="btnb" onclick="press('4')">4</button>
                <button class="btnbl" onclick="press('5')">5</button>
                <button class="btnbl" onclick="press('6')">6</button>

                <button class="btnbl" onclick="press('1')">1</button>
                <button class="btnbl" onclick="press('2')">2</button>
                <button class="btnblu" onclick="press('3')">3</button>

                <button class="btnblu" onclick="press('0')">0</button>
                <button class="btnblu" onclick="press('.')">.</button>
                <button class="btnblue" onclick="solve( )">=</button>

            </div>

        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
