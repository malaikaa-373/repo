<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: rgb(19, 19, 78);
        }

        .container {
            background-color: white;
            text-align: center;
            max-width: 300px;
            width: 95%;
            margin: auto;
            max-height: 400px;
            border-radius: 5px;
            padding: 20px;

        }

        .btn {
            background-color: rgb(224, 224, 126);
            border-radius: 5px;
            border: 2px solid black;
            padding: 5px 10px;
            width: 50px;
            font-size: x-large;
            text-align: center;
            margin-bottom: 10px;
        }

        .btnb {
            background-color: rgb(152, 152, 220);
            border-radius: 5px;
            border: 2px solid black;
            padding: 5px 10px;
            width: 50px;
            font-size: x-large;
            text-align: center;
            margin-bottom: 10px;
        }

        .btnn {
            background-color: rgb(224, 224, 126);
            border-radius: 5px;
            border: 2px solid black;
            padding: 5px 10px;
            width: 50px;
            font-size: x-large;
            text-align: center;
            margin-bottom: 10px;
        }

        .btnbl {
            background-color: rgb(152, 152, 220);
            border-radius: 5px;
            border: 2px solid black;
            padding: 5px 10px;
            width: 50px;
            font-size: x-large;
            text-align: center;
            margin-bottom: 10px;
        }

        .btnblu {
            background-color: rgb(152, 152, 220);
            border-radius: 5px;
            border: 2px solid black;
            padding: 5px 10px;
            width: 50px;
            font-size: x-large;
            text-align: center;
            margin-bottom: 10px;
        }

        .btnred {
            background-color: rgb(203, 22, 22);
            border-radius: 5px;
            border: 2px solid black;
            padding: 5px 10px;
            width: 50px;
            font-size: x-large;
            text-align: center;
            margin-bottom: 10px;
        }

        .container4 {
            display: flex;
            justify-content: center;

        }

        .enter {
            background-color: rgb(29, 139, 47);
            border-radius: 5px;
            border: 2px solid black;
            font-size: x-large;
            padding: 5px 50px;
        }

        input {
            background-color: #f8f8f8;
            width: 100%;
            box-sizing: border-box;
            margin-bottom: 10px;
            height: 40px;
            border-radius: 10px;
            box-shadow: inset rgb(34, 31, 31);
            text-align: right;
            font-size: x-large;

        }

        @media (max-width: 350px) {

            .btn,
            .btnb,
            .btnbl,
            .btnblu,
            .btnred {
                width: 50px;
                height: 50px;
                font-size: 16px;
            }

            .container {
                padding: 10px;
            }
        }
    </style>
</head>

<body>
    <div class="main">
        <div class="container">
            <div class="input">
                <input type="text" id="display">
            </div>
            <button class="btn" onclick="press('+')">+</button>
            <button class="btn" onclick="press('-')">-</button>
            <button class="btn" onclick="press('*')">*</button>
            <button class="btn" onclick="press('/')">/</button>
            <div class="container-1">
                <button class="btnn" onclick="power('^')">^</button>
                <button class="btnn" onclick="press('%')">%</button>
                <button class="btnn" onclick="sqrt()">&radic;</button>
                <button class="btnn" onclick="backspace()">&#9003</button>
            </div>
            <div class="container1">
                <button class="btnb" onclick="press('7')">7</button>
                <button class="btnb" onclick="press('8')">8</button>
                <button class="btnb" onclick="press('9')">9</button>
                <button class="btnb" onclick="press('4')">4</button>
            </div>
            <div class="container2">
                <button class="btnbl" onclick="press('5')">5</button>
                <button class="btnbl" onclick="press('6')">6</button>
                <button class="btnbl" onclick="press('1')">1</button>
                <button class="btnbl" onclick="press('2')">2</button>
            </div>
            <div class="container3">
                <button class="btnblu" onclick="press('3')">3</button>
                <button class="btnblu" onclick="press('0')">0</button>
                <button class="btnblu" onclick="press('.')">.</button>
                <button class="btnred" onclick="ClearScreen( )">C</button>
            </div>
            <div class="container4">
                <button class="enter" onclick="solve( )">=</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
